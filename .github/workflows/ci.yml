name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install jsonschema numpy matplotlib tabulate pytest

      - name: Validate dataset schema
        run: |
          python scripts/validate.py data/train/
          python scripts/validate.py data/validation/
          python scripts/validate.py data/test/

      - name: Run unit tests
        run: pytest tests/ -v

      - name: Smoke-test baseline runner
        run: |
          python evaluation/run_baselines.py --model random_baseline --subset data/test/
